<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AppsBunches — مولّد الصور الوصفية للمتاجر</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
</head>

<body>
  <aside class="sidebar">
    <header class="sidebar__header">
      <a href="https://appsbunches.com/" target="_blank" rel="noopener" class="brand">
        <img src="assets/logo/appsbunches.svg" alt="AppsBunches" />
      </a>
      <h1>مولّد الصور الوصفية</h1>
      <p>ارفع سكرينشوتات تطبيقك، واحصل على صور جاهزة لمتجري App Store و Google Play بالأحجام المعتمدة.</p>
    </header>

    <form id="config-form" class="form" autocomplete="off">
      <!-- رفع السكرينشوتات -->
      <label class="field">
        <span class="field__label">سكرينشوتات التطبيق</span>
        <input type="file" id="shotsInput" accept="image/*" multiple />
        <small class="field__hint">يمكنك اختيار عدة صور دفعة واحدة (نفس المنصّة).</small>
      </label>

      <!-- المنصّة -->
      <div class="field">
        <span class="field__label">منصّة شريط الحالة</span>
        <div class="segmented" id="platformGroup">
          <label class="segmented__item">
            <input type="radio" name="platform" value="ios" checked />
            <span>آيفون (iOS)</span>
          </label>
          <label class="segmented__item">
            <input type="radio" name="platform" value="android" />
            <span>أندرويد</span>
          </label>
        </div>
      </div>

      <!-- العنوان -->
      <label class="field">
        <span class="field__label">العنوان (نص فوق الصورة)</span>
        <input type="text" id="titleInput" placeholder="مثال: تسوّق بسهولة" dir="rtl" />
      </label>

      <!-- الثيم -->
      <div class="field">
        <span class="field__label">خلفية الثيم</span>
        <div class="swatches" id="themeSwatches"></div>
      </div>

      <!-- اللوجو -->
      <label class="field">
        <span class="field__label">اللوجو (للأيقونة والكفر)</span>
        <input type="file" id="logoInput" accept="image/png,image/svg+xml,image/*" />
        <small class="field__hint">يفضّل PNG شفاف.</small>
      </label>

      <!-- إظهار الإطار -->
      <label class="toggle">
        <input type="checkbox" id="frameToggle" checked />
        <span>إظهار إطار الجوال حول السكرينشوت</span>
      </label>

      <!-- الأحجام المطلوبة -->
      <div class="field">
        <span class="field__label">الأحجام المطلوبة</span>
        <div class="presets" id="presetsList"></div>
      </div>

      <!-- الأزرار -->
      <button type="button" id="exportBtn" class="button button--primary">
        <span class="button__label">تصدير الكل (ZIP)</span>
        <span class="spinner" id="spinner" hidden></span>
      </button>
      <button type="button" id="downloadCurrentBtn" class="button button--ghost">
        تحميل المعاينة الحالية
      </button>

      <div id="progress" class="progress" hidden></div>
      <div id="error-box" class="error-box" hidden></div>
    </form>
  </aside>

  <main class="stage">
    <div class="stage__toolbar">
      <label class="stage__select">
        <span>معاينة الحجم</span>
        <select id="previewPreset"></select>
      </label>
    </div>

    <div class="preview">
      <canvas id="previewCanvas" class="preview__canvas"></canvas>
      <p id="emptyHint" class="preview__empty">ارفع سكرينشوت لعرض المعاينة هنا</p>
    </div>

    <div class="thumbs" id="thumbs"></div>
  </main>

  <script src="lib/jszip.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>

</html>
